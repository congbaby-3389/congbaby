  <path d="M222 110 Q228 118 225 128 Q230 122 235 130 Q231 120 234 113" stroke="#d4a847" stroke-width="1" fill="none" opacity="0.7"/>
  <circle cx="225" cy="131" r="2" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="234" cy="132" r="2" fill="#f472b6" opacity="0.7"/>

  <!-- ── 眉毛 ── -->
  <!-- 左眉：细长柳叶眉 -->
  <path d="M162 178 Q174 171 186 173" stroke="#2d1060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M163 179 Q175 173 186 175" stroke="#4c1d95" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 右眉 -->
  <path d="M214 173 Q226 171 238 178" stroke="#2d1060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M214 175 Q226 173 237 179" stroke="#4c1d95" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ── 眼睛 ── -->
  <!-- 左眼眶（丹凤眼，外眦上翘）-->
  <path d="M160 190 Q174 184 188 188 Q182 198 170 199 Q160 196 160 190Z" fill="white"/>
  <!-- 左眼珠 -->
  <ellipse cx="176" cy="192" rx="9" ry="9" fill="url(#eyeR)"/>
  <!-- 左瞳孔 -->
  <ellipse cx="176" cy="193" rx="5" ry="5.5" fill="#0f0520"/>
  <!-- 左眼高光 -->
  <circle cx="172" cy="189" r="3" fill="white" opacity="0.92"/>
  <circle cx="179" cy="196" r="1.5" fill="white" opacity="0.4"/>
  <!-- 左眼睑线 -->
  <path d="M160 190 Q174 183 188 188" stroke="#1a0040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 左眼外眦上翘线 -->
  <path d="M188 188 Q192 184 194 182" stroke="#1a0040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 左下眼睑 -->
  <path d="M162 193 Q174 200 188 196" stroke="#4c1d95" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 左睫毛（上） -->
  <path d="M164 189 L162 184" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M170 186 L169 181" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M176 185 L176 180" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M182 186 L183 181" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M187 188 L190 184" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 右眼眶 -->
  <path d="M212 188 Q226 184 240 190 Q240 196 230 199 Q218 198 212 188Z" fill="white"/>
  <!-- 右眼珠 -->
  <ellipse cx="224" cy="192" rx="9" ry="9" fill="url(#eyeR)"/>
  <!-- 右瞳孔 -->
  <ellipse cx="224" cy="193" rx="5" ry="5.5" fill="#0f0520"/>
  <!-- 右眼高光 -->
  <circle cx="220" cy="189" r="3" fill="white" opacity="0.92"/>
  <circle cx="227" cy="196" r="1.5" fill="white" opacity="0.4"/>
  <!-- 右眼睑线 -->
  <path d="M212 188 Q226 183 240 190" stroke="#1a0040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M212 188 Q208 184 206 182" stroke="#1a0040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 右下眼睑 -->
  <path d="M212 193 Q226 200 238 193" stroke="#4c1d95" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 右睫毛 -->
  <path d="M236 189 L238 184" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M230 186 L231 181" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M224 185 L224 180" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M218 186 L217 181" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M213 188 L210 184" stroke="#0f0520" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ── 鼻子（精致高挺）── -->
  <path d="M198 202 Q200 208 202 202" stroke="#e8b090" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M194 215 Q200 218 206 215" stroke="#e8b090" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- ── 嘴唇（樱桃口）── -->
  <!-- 上唇 -->
  <path d="M188 228 Q194 222 200 224 Q206 222 212 228 Q206 226 200 228 Q194 226 188 228Z" fill="url(#lipR)"/>
  <!-- 下唇 -->
  <path d="M188 228 Q196 238 200 239 Q204 238 212 228 Q206 232 200 233 Q194 232 188 228Z" fill="#e87a8a"/>
  <!-- 唇缝线 -->
  <path d="M188 228 Q200 231 212 228" stroke="#c0485a" stroke-width="0.8" fill="none"/>
  <!-- 唇高光 -->
  <ellipse cx="196" cy="233" rx="4" ry="2" fill="white" opacity="0.25"/>

  <!-- ── 腮红 ── -->
  <ellipse cx="162" cy="220" rx="18" ry="10" fill="#f472b6" opacity="0.12" filter="url(#softBlur)"/>
  <ellipse cx="238" cy="220" rx="18" ry="10" fill="#f472b6" opacity="0.12" filter="url(#softBlur)"/>

  <!-- ── 手 (右手持扇，若隐若现) ── -->
  <!-- 扇子主体 -->
  <path d="M285 255 Q295 240 310 245 Q318 260 308 272 Q296 278 285 270 Z" fill="#4c1d95" opacity="0.9"/>
  <!-- 扇骨 -->
  <path d="M286 263 Q296 248 308 253" stroke="#d4a847" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M287 267 Q297 252 309 258" stroke="#d4a847" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M288 271 Q298 257 309 264" stroke="#d4a847" stroke-width="0.8" fill="none" opacity="0.7"/>
  <!-- 扇缘金边 -->
  <path d="M285 255 Q295 240 310 245 Q318 260 308 272 Q296 278 285 270" stroke="#d4a847" stroke-width="1" fill="none" opacity="0.8"/>
  <!-- 扇坠 -->
  <path d="M285 270 Q280 278 278 286" stroke="#d4a847" stroke-width="1" fill="none" opacity="0.6"/>
  <circle cx="278" cy="288" r="3" fill="#8b5cf6" opacity="0.8"/>

  <!-- ── 左手持梅花枝 ── -->
  <!-- 梅枝 -->
  <path d="M100 270 Q115 260 120 248 Q125 238 118 230" stroke="#5c2a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M118 230 Q122 220 116 212" stroke="#5c2a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 梅花 1 -->
  <g transform="translate(116,210)">
    <circle r="5" fill="#fce7f3"/>
    <circle cx="0" cy="-7" r="3.5" fill="#fda4af"/>
    <circle cx="6.6" cy="-2.2" r="3.5" fill="#fda4af"/>
    <circle cx="4.1" cy="5.7" r="3.5" fill="#fda4af"/>
    <circle cx="-4.1" cy="5.7" r="3.5" fill="#fda4af"/>
    <circle cx="-6.6" cy="-2.2" r="3.5" fill="#fda4af"/>
    <circle r="2.5" fill="#fde68a"/>
  </g>
  <!-- 梅花 2 (小) -->
  <g transform="translate(125,238)">
    <circle cx="0" cy="-5" r="2.5" fill="#fda4af"/>
    <circle cx="4.8" cy="-1.5" r="2.5" fill="#fecdd3"/>
    <circle cx="2.9" cy="4" r="2.5" fill="#fda4af"/>
    <circle cx="-2.9" cy="4" r="2.5" fill="#fecdd3"/>
    <circle cx="-4.8" cy="-1.5" r="2.5" fill="#fda4af"/>
