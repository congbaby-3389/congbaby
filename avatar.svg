<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bgR" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a35"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </radialGradient>
    <!-- 肤色渐变 -->
    <radialGradient id="skinR" cx="48%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffe8d2"/>
      <stop offset="100%" stop-color="#f8c8a0"/>
    </radialGradient>
    <!-- 唇色 -->
    <radialGradient id="lipR" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e87a8a"/>
      <stop offset="100%" stop-color="#c0485a"/>
    </radialGradient>
    <!-- 眼珠光晕 -->
    <radialGradient id="eyeR" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </radialGradient>
    <!-- 发丝渐变 -->
    <linearGradient id="hairG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="50%" stop-color="#1e0a40"/>
      <stop offset="100%" stop-color="#2d1060"/>
    </linearGradient>
    <!-- 汉服渐变 -->
    <linearGradient id="hanzuG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- 领口渐变 -->
    <linearGradient id="collarG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <!-- 装饰光圈 -->
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.15)"/>
      <stop offset="70%" stop-color="rgba(139,92,246,0.05)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- 花瓣渐变 -->
    <radialGradient id="petalR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde8f0"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── 背景 ── -->
  <circle cx="200" cy="200" r="200" fill="url(#bgR)"/>
  <!-- 光晕装饰圈 -->
  <circle cx="200" cy="200" r="188" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="0.5"/>
  <!-- 背景星点 -->
  <circle cx="60" cy="55" r="1.5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="340" cy="70" r="1" fill="#67e8f9" opacity="0.6"/>
  <circle cx="50" cy="180" r="1" fill="#f472b6" opacity="0.5"/>
  <circle cx="355" cy="160" r="1.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="80" cy="310" r="1" fill="#67e8f9" opacity="0.4"/>
  <circle cx="325" cy="320" r="1" fill="#f472b6" opacity="0.5"/>
  <circle cx="120" cy="45" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="280" cy="40" r="1.5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="370" cy="240" r="1" fill="#67e8f9" opacity="0.4"/>
  <!-- 细小花瓣散落 -->
  <ellipse cx="72" cy="130" rx="3" ry="5" fill="#f9a8d4" opacity="0.3" transform="rotate(-30 72 130)"/>
  <ellipse cx="335" cy="110" rx="3" ry="5" fill="#f9a8d4" opacity="0.25" transform="rotate(25 335 110)"/>
  <ellipse cx="55" cy="260" rx="2.5" ry="4" fill="#f9a8d4" opacity="0.2" transform="rotate(15 55 260)"/>
  <ellipse cx="350" cy="280" rx="2.5" ry="4" fill="#f9a8d4" opacity="0.2" transform="rotate(-20 350 280)"/>

  <!-- ── 后发（最底层）── -->
  <!-- 左侧长发垂落 -->
  <path d="M148 148 Q118 190 108 250 Q100 300 112 355 Q124 370 134 360 Q128 310 136 265 Q144 218 158 178" fill="url(#hairG)"/>
  <!-- 右侧长发垂落 -->
  <path d="M252 148 Q282 190 292 250 Q300 300 288 355 Q276 370 266 360 Q272 310 264 265 Q256 218 242 178" fill="url(#hairG)"/>
  <!-- 后脑发量 -->
  <ellipse cx="200" cy="148" rx="68" ry="55" fill="#0f0520"/>

  <!-- ── 汉服主体 ── -->
  <!-- 大袖袍主体 -->
  <path d="M130 310 Q80 290 55 320 Q50 360 80 380 Q140 390 200 388 Q260 390 320 380 Q350 360 345 320 Q320 290 270 310 Q250 305 200 308 Q170 305 130 310Z" fill="url(#hanzuG)"/>
  <!-- 左袖大摆 -->
  <path d="M130 310 Q95 295 65 280 Q40 268 45 295 Q50 322 80 330 Q110 335 135 325Z" fill="url(#hanzuG)"/>
  <!-- 右袖大摆 -->
  <path d="M270 310 Q305 295 335 280 Q360 268 355 295 Q350 322 320 330 Q290 335 265 325Z" fill="url(#hanzuG)"/>
  <!-- 汉服领口 -->
  <path d="M168 285 Q190 295 200 298 Q210 295 232 285 Q218 265 200 268 Q182 265 168 285Z" fill="url(#collarG)"/>
  <!-- 汉服纹样：领口金边 -->
  <path d="M168 285 Q190 295 200 298 Q210 295 232 285" fill="none" stroke="#d4a847" stroke-width="1.2" opacity="0.8"/>
  <!-- 腰带 -->
  <rect x="148" y="305" width="104" height="8" rx="4" fill="#d4a847" opacity="0.7"/>
  <!-- 汉服刺绣花纹（简化） -->
  <circle cx="160" cy="340" r="4" fill="none" stroke="#d4a847" stroke-width="0.8" opacity="0.5"/>
  <circle cx="240" cy="340" r="4" fill="none" stroke="#d4a847" stroke-width="0.8" opacity="0.5"/>
  <path d="M157 337 Q160 333 163 337 Q160 341 157 337" fill="#d4a847" opacity="0.3"/>
  <path d="M237 337 Q240 333 243 337 Q240 341 237 337" fill="#d4a847" opacity="0.3"/>

  <!-- ── 脖子 ── -->
  <rect x="186" y="268" width="28" height="22" rx="8" fill="url(#skinR)"/>

  <!-- ── 脸部 ── -->
  <!-- 脸型：瓜子脸 -->
  <path d="M148 165 Q142 200 145 228 Q150 255 200 268 Q250 255 255 228 Q258 200 252 165 Q238 138 200 135 Q162 138 148 165Z" fill="url(#skinR)"/>

  <!-- 耳朵 -->
  <ellipse cx="148" cy="198" rx="10" ry="14" fill="url(#skinR)"/>
  <ellipse cx="252" cy="198" rx="10" ry="14" fill="url(#skinR)"/>
  <!-- 耳垂阴影 -->
  <ellipse cx="148" cy="205" rx="5" ry="6" fill="#f4b89a" opacity="0.4"/>
  <ellipse cx="252" cy="205" rx="5" ry="6" fill="#f4b89a" opacity="0.4"/>
  <!-- 耳环 -->
  <circle cx="148" cy="212" r="5" fill="none" stroke="#d4a847" stroke-width="1.5"/>
  <circle cx="148" cy="219" r="3" fill="#d4a847" opacity="0.9"/>
  <circle cx="252" cy="212" r="5" fill="none" stroke="#d4a847" stroke-width="1.5"/>
  <circle cx="252" cy="219" r="3" fill="#d4a847" opacity="0.9"/>

  <!-- ── 发型（前额层）── -->
  <!-- 发顶整体 -->
  <path d="M148 165 Q150 130 200 118 Q250 130 252 165 Q240 145 200 140 Q160 145 148 165Z" fill="#0f0520"/>
  <!-- 发际线自然弧 -->
  <path d="M148 170 Q155 148 180 140 Q200 136 220 140 Q245 148 252 170" fill="#0f0520"/>
  <!-- 刘海 (弧形，覆盖额头) -->
  <path d="M152 170 Q164 155 184 153 Q200 151 216 153 Q236 155 248 170 Q238 162 220 158 Q200 156 180 158 Q162 162 152 170Z" fill="#160830"/>
  <!-- 刘海分缝 -->
  <path d="M200 136 Q200 148 200 158" stroke="#0a0320" stroke-width="2" fill="none"/>
  <!-- 刘海发丝细节-左 -->
  <path d="M162 158 Q170 165 176 172" stroke="#250055" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M170 153 Q178 162 183 170" stroke="#250055" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- 刘海发丝细节-右 -->
  <path d="M238 158 Q230 165 224 172" stroke="#250055" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M230 153 Q222 162 217 170" stroke="#250055" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- ── 发髻（顶部）── -->
  <!-- 发髻底座 -->
  <ellipse cx="200" cy="118" rx="28" ry="18" fill="#160830"/>
  <!-- 发髻主体 -->
  <path d="M180 118 Q188 88 200 82 Q212 88 220 118 Q210 112 200 110 Q190 112 180 118Z" fill="#0f0520"/>
  <!-- 发髻装饰钗 -->
  <!-- 横钗 -->
  <rect x="178" y="104" width="44" height="3" rx="1.5" fill="#d4a847" opacity="0.9"/>
  <!-- 钗头左花 -->
  <circle cx="178" cy="105" r="5" fill="#d4a847" opacity="0.8"/>
  <circle cx="178" cy="105" r="3" fill="#fde68a"/>
  <circle cx="174" cy="101" r="2" fill="#d4a847" opacity="0.7"/>
  <circle cx="182" cy="100" r="2" fill="#d4a847" opacity="0.7"/>
  <circle cx="174" cy="109" r="2" fill="#d4a847" opacity="0.7"/>
  <!-- 钗头右宝石 -->
  <circle cx="222" cy="105" r="5" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="222" cy="105" r="2.5" fill="#c4b5fd"/>
  <!-- 竖钗 -->
  <rect x="199" y="82" width="3" height="30" rx="1.5" fill="#d4a847" opacity="0.8"/>
  <circle cx="200" cy="80" r="4" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="200" cy="80" r="2" fill="#c4b5fd"/>
