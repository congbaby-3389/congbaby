  <!-- 四角云纹 -->
  <path d="M30 30 Q40 20 50 30 Q40 40 30 30" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path d="M370 30 Q360 20 350 30 Q360 40 370 30" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path d="M30 370 Q40 380 50 370 Q40 360 30 370" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <path d="M370 370 Q360 380 350 370 Q360 360 370 370" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <!-- 底部署名 -->
  <text x="200" y="392" text-anchor="middle" font-family="'SimSun','STSong',serif" font-size="10" fill="#a78bfa" opacity="0.6" letter-spacing="2">congbaby</text>
</svg>
